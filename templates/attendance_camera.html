<!DOCTYPE html>
<html>
<head>
    <title>Take Attendance</title>

    <style>
        body{
            background:#dfe7f1;
            font-family:Segoe UI;
            text-align:center;
            padding:40px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:20px;
            max-width:700px;
            margin:auto;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        video{
            width:100%;
            border-radius:15px;
            margin-top:20px;
        }

        button{
            background:#1e3a8a;
            color:white;
            border:none;
            padding:15px 30px;
            border-radius:10px;
            margin-top:20px;
            cursor:pointer;
            font-size:18px;
        }

        #result{
            margin-top:20px;
            font-size:22px;
            font-weight:bold;
            color:green;
        }

    </style>
</head>
<body>

<div class="card">

    <h1>📷 Face Attendance</h1>

    <video id="video" autoplay></video>

    <br>

    <button onclick="captureAttendance()">
        Scan Face
    </button>

    <div id="result"></div>

</div>

<script>

const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    video.srcObject = stream;
});


function captureAttendance(){

    let canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");

    ctx.drawImage(video,0,0);

    let image = canvas.toDataURL("image/jpeg");

    fetch("/scan_attendance",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            image:image,
            class_id:"{{ class_id }}"
        })
    })

    .then(res=>res.text())

    .then(data=>{
        document.getElementById("result").innerHTML=data;
    });

}

</script>

</body>
</html>
