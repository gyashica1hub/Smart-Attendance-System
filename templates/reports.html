<!DOCTYPE html>
<html>
<head>
    <title>Attendance Reports</title>

    <style>
        body{
            background:#dfe7f1;
            font-family:Segoe UI;
            padding:40px;
        }

        .card{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 20px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#1e3a8a;
            margin-bottom:30px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:15px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        th{
            background:#1e3a8a;
            color:white;
        }

        tr:hover{
            background:#f3f4f6;
        }

    </style>
</head>
<body>

<div class="card">

    <h1>📊 Attendance Reports</h1>

    <table>

        <tr>
            <th>Student Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
